{% extends 'base.html' %}

{% block conteudo %}
<!-- Template para editar um item existente do estoque -->

<h2>Editar Estoque</h2>

<form method="POST" action="{{ url_for('estoque.atualizar_estoque_route', id=item.id) }}">

    <!-- AUTOCOMPLETE FORNECEDOR -->
    <input type="text" id="fornecedor_input" placeholder="Digite o fornecedor" required
    value="{{ item.nome_empresa }}"
    data-fornecedores='{{ fornecedores | tojson | safe }}'>

    <input type="hidden" name="fornecedor_id" id="fornecedor_id" value="{{ item.fornecedor_id }}">

    <!-- CAIXINHA ROXA -->
    <div id="sugestoes" class="lista-sugestoes"></div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/autocomplete_fornecedor.js') }}"></script>

    <!-- Quantidade -->
    <input type="number" name="quantidade_calcas" value="{{ item.quantidade_calcas }}" required>

    <!-- Preço -->
    <input type="number" step="0.01" name="preco_venda" value="{{ item.preco_venda }}" required>
    <button type="submit">Salvar</button>
    <div style="display: inline-block; margin-left: 10px;">
        <button type="button" class="botao" onclick="history.back()">Voltar</button>
    </div>
</form>

{% endblock %}
