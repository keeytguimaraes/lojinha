{% extends 'base.html' %}

{% block conteudo %}
<h2>Cadastrar Estoque</h2>

<div class="form-container">
    <form action="/add_estoque" method="POST">

        <!-- AUTOCOMPLETE FORNECEDOR -->
        <input type="text" id="fornecedor_input" placeholder="Digite o fornecedor" required
        data-fornecedores='{{ fornecedores | tojson | safe }}'>

        <input type="hidden" name="fornecedor_id" id="fornecedor_id">

        <!-- IMPORTANTE: mesmo ID do cliente -->
        <div id="sugestoes" class="lista-sugestoes"></div>

        <!-- JS -->
        <script src="{{ url_for('static', filename='js/autocomplete_fornecedor.js') }}"></script>

        <!-- resto -->
        <input type="number" name="quantidade_calcas" placeholder="Quantidade" required>

        <input type="number" step="0.01" min="0" name="preco_venda" placeholder="Preço de venda por unidade" required>

        <button type="submit">Cadastrar</button>
        <div style="display: inline-block; margin-left: 10px;">
            <button type="button" class="botao" onclick="history.back()">Voltar</button>
        </div>
    </form>
</div>

{% endblock %}
