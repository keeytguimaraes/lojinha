{% extends 'base.html' %}

{% block conteudo %}

<h2>Vendedores</h2>

<table>
<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
<th>Vendas</th>
<th>Ações</th>
</tr>

{% for vendedor in vendedores %}
<tr>
<td>{{ vendedor.id }}</td>
<td>{{ vendedor.nome }}</td>
<td>{{ vendedor.cpf }}</td>
<td>{{ vendedor.quantidade_vendas }}</td>
<td>
<a href="{{ url_for('vendedor.excluir_vendedor_route', id=vendedor.id) }}">
<button>Excluir</button>
</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
