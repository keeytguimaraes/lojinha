{% extends 'base.html' %}

{% block conteudo %}

<h2>Clientes</h2>

<table>
<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th>Ações</th>
</tr>

{% for cliente in clientes %}
<tr>
<td>{{ cliente.id }}</td>
<td>{{ cliente.nome }}</td>
<td>{{ cliente.cpf }}</td>
<td>{{ cliente.cidade }}</td>
<td>
<a href="{{ url_for('cliente.excluir_cliente_route', id=cliente.id) }}">
<button>Excluir</button>
</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
