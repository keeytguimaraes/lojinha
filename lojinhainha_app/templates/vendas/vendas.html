{% extends 'base.html' %}

{% block conteudo %}
<!-- Template para registrar uma nova venda -->

<h2>Registrar Venda</h2>

<div class="form-container">
    <form action="/add_venda" method="POST">
        <!-- Seleção do cliente com sugestão automática -->
        <input type="text" id="cliente_input" placeholder="Digite o cliente" required
        data-clientes='{{ clientes | tojson | safe }}'>
 <input type="hidden" name="cliente_id" id="cliente_id">
 <input type="text" name="cpf" id="cpf" placeholder="CPF" readonly required>
 
 <div id="sugestoes" class="lista-sugestoes"></div>
 
 <!-- link para o JS externo -->
 <script src="{{ url_for('static', filename='js/autocomplete_cliente.js') }}"></script>
 

        <!-- Seleção do vendedor -->
        <select name="vendedor_id" required>
            <option value="">Vendedor</option>
            {% for vendedor in vendedores %}
            <option value="{{ vendedor.id }}">{{ vendedor.nome }}</option>
            {% endfor %}
        </select>

        <!-- Dados da venda -->
        <input type="number" name="quantidade_vendas" placeholder="Quantidade" required>
        <input type="number" step="0.01" min="0" name="preco" placeholder="Preço" required>
        <input type="date" name="data" required>

        <button type="submit">Registrar</button>
    </form>
</div>

{% endblock %}
