{% extends 'base.html' %}

{% block conteudo %}
<!-- Template para editar uma venda existente -->

<h2>Editar Venda</h2>

<form method="POST" action="/atualizar_venda/{{ venda.id }}">

    <!-- CLIENTE -->
    <input type="text" id="cliente_input" placeholder="Digite o cliente" required
    value="{{ venda.cliente }}"
    data-clientes='{{ clientes | tojson | safe }}'>
    <input type="hidden" name="cliente_id" id="cliente_id" value="{{ venda.cliente_id }}">
    <input type="text" name="cpf" id="cpf" value="{{ venda.cpf }}" readonly required>
    <div id="sugestoes" class="lista-sugestoes"></div>
    <script src="{{ url_for('static', filename='js/autocomplete_cliente.js') }}"></script>

    <!-- VENDEDOR -->
    <input type="text" id="vendedor_input" placeholder="Digite o vendedor" required
    value="{{ venda.vendedor }}"
    data-clientes='{{ vendedores | tojson | safe }}'>
    <input type="hidden" name="vendedor_id" id="vendedor_id" value="{{ venda.vendedor_id }}">

    <!-- Quantidade vendida -->
    <input type="number" name="quantidade_vendas" value="{{ venda.quantidade_vendas }}" required>
    
    <!-- Preço por unidade -->
    <input type="number" step="0.01" name="preco" value="{{ venda.preco }}" required>
    <input type="date" name="data" value="{{ venda.data }}" required>
    <button type="submit">Salvar</button>
    <div style="display: inline-block; margin-left: 10px;">
        <button type="button" class="botao" onclick="history.back()">Voltar</button>
    </div>
</form>

<script src="{{ url_for('static', filename='js/autocomplete_vendedor.js') }}"></script>

{% endblock %}
