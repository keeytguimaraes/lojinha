{% extends 'base.html' %}

{% block conteudo %}

<h2>Cadastrar Estoque</h2>

<div class="form-container">

<form action="/add_estoque" method="POST">

<input type="number" name="quantidade_calcas" placeholder="Quantidade" required>
<input type="number" step="0.01" name="preco_venda" placeholder="Preço" required>

<select name="vendedor_id" required>
<option value="">Escolha um vendedor</option>

{% for vendedor in vendedores %}
<option value="{{ vendedor.id }}">{{ vendedor.nome }}</option>
{% endfor %}

</select>

<button type="submit">Cadastrar</button>

</form>

</div>

{% endblock %}
