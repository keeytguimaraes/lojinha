<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fornecedores</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Cadastro de Fornecedor</h1>

<form action="/add_fornecedor" method="POST">

<h2>Dados do fornecedor</h2>

<input type="text" name="nome_empresa" placeholder="Nome da empresa" required>

<input type="text" name="cnpj" placeholder="CNPJ" required>

<input type="number" name="produto_quantidade" placeholder="Quantidade de produtos" required>

<input type="number" step="0.01" name="preco" placeholder="Preço" required>

<h2>Endereço do fornecedor</h2>

<input type="text" name="cidade" placeholder="Cidade" required>

<input type="text" name="rua" placeholder="Rua" required>

<input type="text" name="bairro" placeholder="Bairro" required>

<input type="number" name="numero" placeholder="Número" required>

<input type="text" name="complemento" placeholder="Complemento">

<button type="submit">Adicionar fornecedor</button>

</form>

<br>

<a href="/">Voltar</a>

</body>
</html>
